apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aegisfleet
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: aegisfleet-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aegisfleet-config
            - secretRef:
                name: aegisfleet-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aegisfleet
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
