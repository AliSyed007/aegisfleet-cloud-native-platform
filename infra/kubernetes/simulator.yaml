apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: aegisfleet
  labels:
    app: simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
    spec:
      containers:
        - name: simulator
          image: aegisfleet-simulator:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aegisfleet-config
