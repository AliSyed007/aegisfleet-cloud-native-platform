name: AegisFleet CI

on:
  push:
    branches:
      - main
      - "phase*"
  pull_request:

jobs:
  quality:
    name: Local quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          python3 --version
          make --version
          docker --version
          docker compose version

      - name: Create local environment file
        run: cp .env.example .env

      - name: Run local quality gates
        run: make quality

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate Kubernetes manifests
        run: make k8s-validate

      - name: Build Docker images
        run: make build

      - name: Start infrastructure stack
        run: make up-infra

      - name: Run Compose smoke test
        run: make smoke

      - name: Show Compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Clean up Compose stack
        if: always()
        run: docker compose down -v --remove-orphans
