services:
  postgres:
    image: postgres:16-alpine
    container_name: aegisfleet-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/migrations/001_create_telemetry_events.sql:/docker-entrypoint-initdb.d/001_create_telemetry_events.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: aegisfleet-api:local
    container_name: aegisfleet-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    image: aegisfleet-simulator:local
    container_name: aegisfleet-simulator
    env_file:
      - .env
    environment:
      API_URL: http://api:8000/telemetry
    depends_on:
      api:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: aegisfleet-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
